<!DOCTYPE html>
<html>
<head>
    <title>AI Story Generator</title>
</head>
<body style="font-family: Arial; text-align:center; background:#eef;">

<h1>AI Story Generator 📖</h1>

<form method="post">
    <input type="text" name="prompt" placeholder="Enter story topic" required>
    <br><br>
    <button type="submit">Generate Story</button>
</form>

<br>

{% if story %}
<h3>Your Story:</h3>
<p style="width:60%; margin:auto;">{{ story }}</p>
{% endif %}

</body>
</html>
